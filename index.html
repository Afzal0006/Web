<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Fahad Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }
    .banner {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      padding: 40px 15px;
    }
    .banner h1 {
      margin: 0;
      font-size: 32px;
    }
    .banner p {
      margin-top: 10px;
      font-size: 16px;
    }
    .box {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
    .btn {
      display: block;
      margin: 12px auto;
      padding: 15px;
      width: 80%;
      max-width: 300px;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
    }
    .call { background: #28a745; }
    .whatsapp { background: #25D366; }
  </style>
</head>
<body>

  <div class="banner">
    <h1>Fahad Library</h1>
    <p>Notes • Books • Xerox • Competitive Exam</p>
  </div>

  <div class="box">
    <h2>📞 Contact Us</h2>

    <a class="btn call" href="tel:9876543210">
      Call Now
    </a>

    <a class="btn whatsapp" href="https://wa.me/919876543210">
      WhatsApp Chat
    </a>

    <p>🕘 Time: 9 AM – 9 PM</p>
    <p>📍 Address: Main Road, Your Area</p>
  </div>

</body>
</html>

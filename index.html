<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NFT Portal Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0b0f1a;
  color:#fff;
}
header{
  padding:25px;
  text-align:center;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
}
header h1{margin:0;font-size:32px}
header p{opacity:.9}

.container{
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.section{
  margin-top:30px;
}

.section h2{
  margin-bottom:10px;
  border-left:4px solid #6a11cb;
  padding-left:10px;
}

.form{
  background:#151a2d;
  padding:15px;
  border-radius:10px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:16px;
}

input,select{
  background:#1f2545;
  color:#fff;
}

button{
  background:#6a11cb;
  color:#fff;
  cursor:pointer;
}
button:hover{opacity:.9}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#151a2d;
  border-radius:12px;
  padding:15px;
  position:relative;
}
.card img{
  width:100%;
  border-radius:8px;
}
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#28a745;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}
.sold{background:#dc3545}

.card h3{margin:10px 0 5px}
.card p{margin:0;font-size:14px;opacity:.85}

.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}
.actions button{
  flex:1;
  font-size:14px;
}

.footer{
  text-align:center;
  padding:20px;
  opacity:.6;
}

.link-btn{
  display:inline-block;
  margin:5px;
  padding:10px 15px;
  background:#25D366;
  border-radius:6px;
  color:#000;
  text-decoration:none;
  font-weight:bold;
}
.telegram{background:#0088cc;color:#fff}
</style>
</head>

<body>

<header>
  <h1>🚀 NFT PORTAL</h1>
  <p>Telegram Gift Marketplace Demo</p>
</header>

<div class="container">

<!-- ADD NFT -->
<div class="section">
<h2>🎁 Transfer Gift to Portal</h2>
<div class="form">
  <input id="name" placeholder="NFT / Gift Name">
  <select id="type">
    <option>Golden Gift</option>
    <option>Rare Box</option>
    <option>Premium Pass</option>
  </select>
  <input id="price" placeholder="Price (TON)" type="number">
  <button onclick="addNFT()">Transfer & List</button>
</div>
</div>

<!-- MARKET -->
<div class="section">
<h2>🛒 Marketplace</h2>
<div id="market" class="grid"></div>
</div>

<div class="section" style="text-align:center">
<a class="link-btn telegram" href="https://t.me/yourbot">Telegram Bot</a>
<a class="link-btn" href="https://wa.me/919999999999">WhatsApp</a>
</div>

</div>

<div class="footer">
Demo Portal • Frontend Only • Vercel Ready
</div>

<script>
let market=document.getElementById("market");
let nftData=[];

function addNFT(){
  let name=document.getElementById("name").value;
  let type=document.getElementById("type").value;
  let price=document.getElementById("price").value;

  if(!name||!price){
    alert("Fill all details");
    return;
  }

  let nft={
    id:Date.now(),
    name:name,
    type:type,
    price:price,
    status:"LISTED"
  };

  nftData.unshift(nft);
  render();
  document.getElementById("name").value="";
  document.getElementById("price").value="";
}

function render(){
  market.innerHTML="";
  nftData.forEach(n=>{
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <span class="badge ${n.status==='SOLD'?'sold':''}">${n.status}</span>
      <img src="https://picsum.photos/300?random=${n.id}">
      <h3>${n.name}</h3>
      <p>Type: ${n.type}</p>
      <p>Price: ${n.price} TON</p>
      <div class="actions">
        <button onclick="buy(${n.id})">Buy</button>
        <button onclick="removeNFT(${n.id})">Remove</button>
      </div>
    `;
    market.appendChild(card);
  });
}

function buy(id){
  let nft=nftData.find(n=>n.id===id);
  nft.status="SOLD";
  render();
}

function removeNFT(id){
  nftData=nftData.filter(n=>n.id!==id);
  render();
}

render();
</script>

</body>
</html>
